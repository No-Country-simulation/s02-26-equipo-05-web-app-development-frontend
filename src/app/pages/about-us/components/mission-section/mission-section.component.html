<section class="py-24 bg-white">
  <div class="max-w-6xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
    <!-- Columna izquierda -->
    <article>
      <p class="text-sm font-semibold text-primary uppercase tracking-wider mb-4">
        {{ label }}
      </p>

      <h2 class="text-3xl md:text-4xl font-bold text-secondary leading-tight">
        {{ title }}
      </h2>

      <p class="mt-6 text-lg text-gray-600 max-w-xl">
        {{ description }}
      </p>

      <div class="mt-10 space-y-8">
        @for (item of highlights; track item.title) {
        <div class="flex items-start gap-5">
          <div class="flex-shrink-0 w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
            @switch (item.icon) {
            @case ('innovation') {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 18v-5.25m0 0a6.01 6.01 0 0 0 1.5-.189m-1.5.189a6.01 6.01 0 0 1-1.5-.189m3.75 7.478a12.06 12.06 0 0 1-4.5 0m3.75 2.383a14.406 14.406 0 0 1-3 0M14.25 18v-.192c0-.983.658-1.82 1.508-2.316a7.5 7.5 0 1 0-7.516 0c.85.496 1.508 1.333 1.508 2.316v.192m4.5 0h-4.5" />
            </svg>
            }
            @case ('value') {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" />
            </svg>
            }
            }
          </div>

          <div>
            <h3 class="font-semibold text-lg text-secondary">
              {{ item.title }}
            </h3>
            <p class="text-gray-600 mt-1">
              {{ item.description }}
            </p>
          </div>
        </div>
        }
      </div>
    </article>

    <!-- Columna derecha -->
    <article class="grid grid-cols-2 gap-6">
      @for (metric of metrics; track metric.value) {
      <div
        class="relative p-8 rounded-2xl bg-white border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 text-center">
        <div
          class="absolute inset-0 rounded-2xl bg-gradient-to-br from-primary/5 to-transparent opacity-0 hover:opacity-100 transition-opacity duration-300">
        </div>

        <h2 class="relative text-4xl md:text-5xl font-extrabold text-primary mb-3">
          {{ metric.value }}
        </h2>

        <span class="relative text-sm font-semibold text-gray-500 uppercase tracking-wide">
          {{ metric.label }}
        </span>
      </div>
      }
    </article>
  </div>
</section>

<section class="py-24 bg-white">
  <div class="max-w-6xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
    <!-- Columna izquierda -->
    <article>
      <p class="text-sm font-semibold text-primary uppercase tracking-wider mb-4">
        {{ label }}
      </p>

      <h2 class="text-3xl md:text-4xl font-bold text-secondary leading-tight">
        {{ title }}
      </h2>

      <p class="mt-6 text-lg text-gray-600 max-w-xl">
        {{ description }}
      </p>

      <div class="mt-10 space-y-8">
        @for (item of highlights; track item.title) {
        <div class="flex items-start gap-5">
          <div
            class="flex-shrink-0 w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center"
          >
            <img [src]="item.image" [alt]="item.alt" class="w-6 h-6 object-contain" />
          </div>

          <div>
            <h3 class="font-semibold text-lg text-secondary">
              {{ item.title }}
            </h3>
            <p class="text-gray-600 mt-1">
              {{ item.description }}
            </p>
          </div>
        </div>
        }
      </div>
    </article>

    <!-- Columna derecha -->
    <article class="grid grid-cols-2 gap-6">
      @for (metric of metrics; track metric.value) {
      <div
        class="relative p-8 rounded-2xl bg-white border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 text-center"
      >
        <div
          class="absolute inset-0 rounded-2xl bg-gradient-to-br from-primary/5 to-transparent opacity-0 hover:opacity-100 transition-opacity duration-300"
        ></div>

        <h2 class="relative text-4xl md:text-5xl font-extrabold text-primary mb-3">
          {{ metric.value }}
        </h2>

        <span class="relative text-sm font-semibold text-gray-500 uppercase tracking-wide">
          {{ metric.label }}
        </span>
      </div>
      }
    </article>
  </div>
</section>
